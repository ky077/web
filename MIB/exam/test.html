<!-- test js --> 
<script>
$(function(){
    //都作答才可按下一題
	$('input[type="radio"]').change(function () {
		if( $('input[type="radio"]:checked').length == $('.div_text_item').length ){
            $('#WARNING strong').hide();
            $('#VIRTUAL').remove();
			$('#NEXT').attr("disabled",false);
		}else{
            $('#VIRTUAL').show();
			$('#NEXT').attr("disabled",true);
		}
	});
    
    //未作答完成又一直按下一題，出現「還有題目未完成」訊息
    let i = 0;
    $('#VIRTUAL').click(function (e){
        e.preventDefault();
        
        i++;
        if( i > 1){
            $('#WARNING strong').show();   
        }
    }); 
    
    //[下一題]
    $('#NEXT').click(function (){ 
        window.location.href = 'test2.html';   
    });
})
</script>
